<title>TB Activation Tracker</title>
<style>
:root{
  --bg:#0d1117; --card:#161b22; --card2:#1c2330; --line:#2d333b;
  --txt:#e6edf3; --dim:#8b949e; --accent:#4ea1ff;
  --se:#3fb950; --lss:#4ea1ff; --str:#f47b5d; --hic:#ffa657; --gc:#bc8cff;
  --test:#e3b341; --rest:#545d68; --done:#3fb950; --skip:#8b949e;
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:16px;overscroll-behavior-y:none}
body{padding-top:var(--safe-top)}
#app{max-width:560px;margin:0 auto;padding:12px 14px calc(84px + var(--safe-bot))}
h1{font-size:1.15rem;font-weight:700;letter-spacing:.02em}
.hdr{display:flex;align-items:baseline;justify-content:space-between;margin:6px 0 14px}
.hdr small{color:var(--dim);font-size:.78rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.card h2{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:10px}
.next-title{font-size:1.25rem;font-weight:700;margin:2px 0 2px}
.next-sub{color:var(--dim);font-size:.9rem;margin-bottom:8px}
.pill{display:inline-block;font-size:.68rem;font-weight:700;letter-spacing:.05em;padding:2px 8px;border-radius:99px;text-transform:uppercase}
.line{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:.92rem}
.line:last-child{border-bottom:none}
.line .nm{flex:1}
.line .sc{color:var(--dim);text-align:right;white-space:nowrap}
.line .wt{color:var(--test);font-weight:600;white-space:nowrap}
.btnrow{display:flex;gap:8px;margin-top:12px}
button{font:inherit;border:none;border-radius:10px;padding:10px 14px;font-weight:600;cursor:pointer}
.b-pri{background:var(--done);color:#04150a;flex:1}
.b-sec{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.b-ghost{background:none;color:var(--dim);border:1px solid var(--line)}
.b-danger{background:#da3633;color:#fff}
.weekrow{margin-bottom:10px}
.weekhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;font-size:.85rem}
.weekhead b{font-size:.92rem}
.weekhead span{color:var(--dim);font-size:.75rem}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day{position:relative;border-radius:9px;padding:7px 2px 6px;text-align:center;font-size:.62rem;font-weight:700;letter-spacing:.02em;border:1px solid var(--line);background:var(--card2);color:var(--dim);min-height:46px;cursor:pointer}
.day .dn{display:block;font-size:.58rem;font-weight:400;opacity:.7;margin-bottom:2px}
.day.t-se{border-color:var(--se);color:var(--se)}
.day.t-lss{border-color:var(--lss);color:var(--lss)}
.day.t-str{border-color:var(--str);color:var(--str)}
.day.t-hic{border-color:var(--hic);color:var(--hic)}
.day.t-gc{border-color:var(--gc);color:var(--gc)}
.day.t-test{border-color:var(--test);color:var(--test)}
.day.t-rest{opacity:.55}
.day.done{background:rgba(63,185,80,.16)}
.day.done::after{content:"✓";position:absolute;top:2px;right:4px;font-size:.6rem;color:var(--done)}
.day.skip{opacity:.4}
.day.skip::after{content:"–";position:absolute;top:1px;right:5px;color:var(--skip)}
.day.today-ring{box-shadow:0 0 0 2px var(--accent)}
.day .hv{position:absolute;bottom:3px;left:38%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#ff5c8a}
.day .hh{position:absolute;bottom:3px;left:62%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#2dd4bf}
details.inst{margin-top:10px;font-size:.82rem;color:var(--dim)}
details.inst summary{cursor:pointer;color:var(--accent);font-weight:600}
details.inst ol{margin:8px 0 4px 18px;line-height:1.6}
textarea{font:inherit;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px;width:100%;min-height:70px}
.phase-label{display:flex;align-items:center;gap:8px;margin:20px 0 10px;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
.phase-label::after{content:"";flex:1;height:1px;background:var(--line)}
.prog-wrap{background:var(--card2);border-radius:99px;height:8px;overflow:hidden;margin:6px 0 4px}
.prog-bar{height:100%;border-radius:99px;background:var(--accent)}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--card2);border-radius:12px;padding:12px;text-align:center}
.stat .v{font-size:1.5rem;font-weight:700}
.stat .l{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
#tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(13,17,23,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 0 calc(8px + var(--safe-bot));z-index:50}
#tabbar button{background:none;color:var(--dim);font-size:.68rem;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 16px;font-weight:600}
#tabbar button.on{color:var(--accent)}
#tabbar .ic{font-size:1.25rem;line-height:1}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;cursor:pointer}
#modal.open{display:flex}
#modal .sheet{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:560px;margin:0 auto;max-height:86vh;overflow-y:auto;padding:18px 18px calc(24px + var(--safe-bot));cursor:auto;position:relative}
.closex{position:absolute;top:12px;right:14px;width:34px;height:34px;border-radius:50%;background:var(--card2);border:1px solid var(--line);color:var(--txt);font-size:1.05rem;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;z-index:5}
.sheet .grab{width:36px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 14px}
.sheet h3{font-size:1.2rem;margin:6px 0 2px}
.sheet .when{color:var(--dim);font-size:.85rem;margin-bottom:12px}
.def{background:var(--card2);border-radius:10px;padding:12px;font-size:.88rem;line-height:1.5;color:#c9d1d9;margin-top:12px;white-space:pre-line}
.note{font-size:.8rem;color:var(--dim);line-height:1.45;margin-top:10px}
input,select{font:inherit;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px 12px;width:100%}
label{display:block;font-size:.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px}
.maxgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.maxgrid .mx label{margin-top:0}
.hevy-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:.88rem}
.hevy-item:last-child{border:none}
.hevy-item .t{color:var(--dim);font-size:.78rem}
.banner{background:rgba(227,179,65,.12);border:1px solid rgba(227,179,65,.4);color:var(--test);border-radius:10px;padding:10px 12px;font-size:.82rem;line-height:1.4;margin-bottom:12px}
.overdue{color:var(--hic);font-size:.8rem;font-weight:600}
.small{font-size:.78rem;color:var(--dim);line-height:1.5}
a{color:var(--accent)}
</style>
</head>
<body>
<div id="app"></div>
<nav id="tabbar">
  <button data-tab="today"><span class="ic">◉</span>Today</button>
  <button data-tab="plan"><span class="ic">▤</span>Plan</button>
  <button data-tab="stats"><span class="ic">◔</span>Stats</button>
  <button data-tab="settings"><span class="ic">⚙</span>Setup</button>
</nav>
<div id="modal"><div class="sheet" id="sheet"></div></div>

<script>
"use strict";
/* ================= STATE ================= */
const LSKEY="tb3_activation_v1";
const DAYMS=86400000;
let state=null;
function defaultState(){
  const status={};
  // Seeded: started Mon 2026-06-29, completed through Week 2 Day 4
  for(let d=1;d<=7;d++) status["1."+d]="done";
  for(let d=1;d<=4;d++) status["2."+d]="done";
  return {start:"2026-06-29", key:"", units:"lb", maxes:{}, status, notes:{}, deloads:[], hevy:{byDate:{},last:null}, order:{}, shifts:[], rolling:false, health:{byDate:{},last:null}, maxLog:[], wizards:{}, autoComplete:true};
}
function load(){ try{const raw=localStorage.getItem(LSKEY); state=raw?Object.assign(defaultState(),JSON.parse(raw)):defaultState();}catch(e){state=defaultState();} }
function save(){ localStorage.setItem(LSKEY,JSON.stringify(state)); }

/* ================= PLAN DATA ================= */
const MAXKEYS=[["bench","Bench Press"],["squat","Squat"],["dead","Deadlift"],["row","Barbell/Pendlay Row"],["rack","Rack Pull"],["ohp","Overhead Press"],["pc","Power Clean"],["pp","Push Press"]];
const S=(tag,title,sub,lines,def,notes)=>({tag,title,sub:sub||"",lines:lines||[],def:def||null,notes:notes||[]});
const REST=S("rest","Rest","Recovery day");

function abLine(){return {nm:"Finisher: Ab Triad",sc:"3 x 5",def:"abtriad"};}
function basePlan(){
  const seW={1:[10,10,10],2:[15,15,15],3:[20,20,20],4:[25,25,25]};
  const lssW={1:[30,30,35],2:[40,40,45],3:[50,50,55],4:[60,60,60]};
  const wks=[];
  for(let w=1;w<=4;w++){
    const days=[];
    const circ=[3,3,4];
    for(let i=0;i<3;i++){
      days.push(S("se","SE Circuit",circ[i]+" circuits × "+seW[w][i]+" reps",[
        {nm:"Push-ups",sc:circ[i]+" x "+seW[w][i]},
        {nm:"DB/KB Goblet Squat",sc:circ[i]+" x "+seW[w][i]},
        {nm:"Inverted Row",sc:circ[i]+" x "+seW[w][i]},
        abLine()
      ],"se"));
    }
    const wk=[days[0],
      S("lss","LSS Run",lssW[w][0]+" min",[{nm:"Easy conversational run",sc:lssW[w][0]+" min"}],"lss"),
      days[1],
      S("lss","LSS Run",lssW[w][1]+" min",[{nm:"Easy conversational run",sc:lssW[w][1]+" min"}],"lss"),
      days[2],
      S("lss","LSS Run",lssW[w][2]+" min",[{nm:"Easy conversational run",sc:lssW[w][2]+" min"}],"lss"),
      REST];
    wks.push({phase:"Base",phaseWeek:w,days:wk});
  }
  const testS=S("test","1RM Testing","Establish 1RMs for Armor",[
    {nm:"Bench Press",sc:"work to 1-3RM"},{nm:"Barbell Row",sc:"work to 1-3RM"},
    {nm:"Squat",sc:"work to 1-3RM"},{nm:"Deadlift",sc:"work to 1-3RM"},
    {nm:"Rack Pull",sc:"work to 1-3RM"},{nm:"Overhead Press",sc:"work to 1-3RM"}
  ],"testing",["Spread testing across the 3 days however you like — single session or split.","Enter results under Setup → Maxes so Armor weights auto-fill."]);
  wks.push({phase:"Base",phaseWeek:5,label:"Rest & Test",days:[REST,REST,testS,testS,testS,REST,REST]});
  return wks;
}
function zuluWeek(bw,blockNo){
  // bw = 1..3 within block
  const main1=[["4 x 8","70"],["4 x 5","80"],["4 x 3","85"]][bw-1];
  const main2=[["3 x 8","75"],["3 x 5","80"],["3 x 3","85"]][bw-1];
  const dlSets=[3,2,1][bw-1];
  const supPct=[65,70,75][bw-1];
  const supp=(v)=>({nm:"Supp "+v+(v==="A"?": Rev-Hyper/Back Ext + Ab Triad":": Pullups/Inv Rows + OHP"),sc:"3-5 x 8-10 @ "+supPct+"%",pct:v==="B"?{lift:"ohp",p:supPct}:null});
  const d1=S("str","Zulu — Squat Day",main1[0]+" @ "+main1[1]+"%",[
    {nm:"Squat",sc:main1[0]+" @ "+main1[1]+"%",pct:{lift:"squat",p:+main1[1]}},
    {nm:"Rack Pull",sc:main1[0]+" @ "+main1[1]+"%",pct:{lift:"rack",p:+main1[1]}},
    supp("A")],"zulu");
  const d2=S("str","Zulu — Bench Day",main1[0]+" @ "+main1[1]+"%",[
    {nm:"Bench Press",sc:main1[0]+" @ "+main1[1]+"%",pct:{lift:"bench",p:+main1[1]}},
    {nm:"Barbell Row",sc:main1[0]+" @ "+main1[1]+"%",pct:{lift:"row",p:+main1[1]}},
    supp("B")],"zulu");
  const d4=S("str","Zulu — Squat/DL Day",main2[0]+" @ "+main2[1]+"%",[
    {nm:"Squat",sc:main2[0]+" @ "+main2[1]+"%",pct:{lift:"squat",p:+main2[1]}},
    {nm:"Deadlift",sc:dlSets+" x "+main2[0].split(" x ")[1]+" @ "+main2[1]+"%",pct:{lift:"dead",p:+main2[1]}},
    supp("A")],"zulu",["Deadlift: week "+bw+" of block = "+dlSets+" work set"+(dlSets>1?"s":"")+"."]);
  const d6=S("str","Zulu — Bench Day",main2[0]+" @ "+main2[1]+"%",[
    {nm:"Bench Press",sc:main2[0]+" @ "+main2[1]+"%",pct:{lift:"bench",p:+main2[1]}},
    {nm:"Barbell Row",sc:main2[0]+" @ "+main2[1]+"%",pct:{lift:"row",p:+main2[1]}},
    supp("B")],"zulu");
  const lss=S("lss","LSS","60 min",[{nm:"LSS — bike/rower/elliptical OK this block",sc:"60 min"}],"lss-armor");
  return {phase:"Armor",phaseWeek:(blockNo-1)*3+bw,label:"Zulu Block "+blockNo+" · Wk "+bw,days:[d1,d2,lss,d4,lss,d6,REST]};
}
function operatorLift(scheme,pct,peak){
  if(peak) return null;
  return {scheme,pct};
}
function opWeek(bw){
  // bw 1..12 (Blue 1-6, Black 7-12)
  const isBlack=bw>6;
  const setsPrefix=isBlack?"3-5 x ":"";
  const schemes={1:["3 x 5",75],2:["4 x 5",80],3:["5 x 3",85],4:["4 x 5",75],5:["3 x 5",80],7:["5",75],8:["5",80],9:["3",85],10:["5",75],11:["5",80]};
  const condBlue={1:["LSS 60","LSS 60","Hill Sprints x 6-8"],2:["LSS 30-60","LSS 30-60","LSS 30-60"],3:["LSS 60","LSS 60","Hill Sprints x 6-8"],4:["LSS 30-60","LSS 30-60","LSS 30-60"],5:["LSS 60","LSS 60","Hill Sprints x 6-8"],6:["LSS 30","LSS 30","LSS 30"]};
  const condBlack={7:["Trail Run 60-90","LSS 60-90","4x8 Interval Run"],8:["Afterburner 60-90","LSS 60-90","Hill Sprints x 8-10"],9:["Trail Run 60-90","LSS 60-90","4x8 Interval Run"],10:["Afterburner 60-90","LSS 60-90","Hill Sprints x 8-10"],11:["Trail Run 60-90","LSS 60-90","4x8 Interval Run"],12:["LSS 30","LSS 30","LSS 30"]};
  const cond=isBlack?condBlack[bw]:condBlue[bw];
  const condDef=(t)=>t.startsWith("Hill")?"hill":t.startsWith("4x8")?"i48":t.startsWith("Trail")?"tr":t.startsWith("After")?"ab":"lss";
  const condS=(t)=>S(t.startsWith("Hill")||t.startsWith("4x8")?"hic":"lss",t.split(" x ")[0],t,[{nm:t,sc:""}],condDef(t));
  const peak=bw===6||bw===12;
  let d1,d3,d5;
  if(peak){
    d1=S("test","PEAK — Squat","1 x 3 @ 85%+ then push",[{nm:"Squat",sc:"1 x 3 @ 85%+",pct:{lift:"squat",p:85}}],"peaking",["Peak on Days 1, 4 and 7 — take the extra rest day between sessions.","Conditioning is minimized this week."]);
    d3=S("test","PEAK — Bench","1 x 3 @ 85%+ then push",[{nm:"Bench Press",sc:"1 x 3 @ 85%+",pct:{lift:"bench",p:85}}],"peaking");
    d5=S("test","PEAK — Deadlift","1 x 3 @ 85%+ then push",[{nm:"Deadlift",sc:"1 x 3 @ 85%+",pct:{lift:"dead",p:85}}],"peaking");
  }else{
    const [reps,pct]=schemes[bw];
    const sch=setsPrefix+reps+" @ "+pct+"%";
    d1=S("str","Operator A",sch,[
      {nm:"Bench Press",sc:sch,pct:{lift:"bench",p:pct}},
      {nm:"Squat",sc:sch,pct:{lift:"squat",p:pct}},
      {nm:"Barbell Row",sc:sch,pct:{lift:"row",p:pct}},
      abLine()],"operator");
    d3=S("str","Operator A",sch,[
      {nm:"Bench Press",sc:sch,pct:{lift:"bench",p:pct}},
      {nm:"Squat",sc:sch,pct:{lift:"squat",p:pct}},
      {nm:"Barbell Row",sc:sch,pct:{lift:"row",p:pct}},
      abLine()],"operator");
    d5=S("str","Operator B",sch,[
      {nm:"Bench Press",sc:sch,pct:{lift:"bench",p:pct}},
      {nm:"Deadlift",sc:"1-3 x "+reps.split(" x ").pop()+" @ "+pct+"%",pct:{lift:"dead",p:pct}},

const fmtD=(d)=>d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});
const iso=(d)=>{const p=n=>String(n).padStart(2,"0");return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());};
function startDate(){const [y,m,d]=state.start.split("-").map(Number);return new Date(y,m-1,d);}
function deloadsBefore(w){return state.deloads.filter(x=>x<w).length;}
function calIndexOfWeek(w){return (w-1)+deloadsBefore(w);}
function orderOf(w){return state.order[w]||[1,2,3,4,5,6,7];}
function slotOf(w,origD){return orderOf(w).indexOf(origD)+1;}
function absOf(w,slot){return calIndexOfWeek(w)*7+(slot-1);}
function shiftFor(abs){let s=0;for(const sh of (state.shifts||[]))if(sh.fromAbs<=abs)s+=sh.days;return s;}
function dateOfSlot(w,slot){const t=new Date(startDate());t.setDate(t.getDate()+absOf(w,slot)+shiftFor(absOf(w,slot)));return t;}
function dateOfDay(w,origD){return dateOfSlot(w,slotOf(w,origD));}
function totalCalWeeks(){return PLAN.length+state.deloads.length;}
function todayPos(){
  const t=new Date();t.setHours(0,0,0,0);
  if(t<dateOfSlot(1,1))return {before:true};
  for(const wk of PLAN){
    for(let slot=1;slot<=7;slot++){
      if(dateOfSlot(wk.n,slot).getTime()===t.getTime()){
        return {entry:{kind:"week",wk},day:orderOf(wk.n)[slot-1],slot};
      }
    }
  }
  if(t>dateOfSlot(PLAN.length,7))return {after:true};
  let after=null;
  for(const wk of PLAN){ if(dateOfSlot(wk.n,7)<t) after=wk.n; }
  return {gap:true, afterWeek:after};
}
function sessionsChrono(){
  const out=[];
  for(const wk of PLAN){
    const ord=orderOf(wk.n);
    for(let slot=1;slot<=7;slot++){const d=ord[slot-1];out.push({w:wk.n,d,slot,wk,s:wk.days[d-1]});}
  }
  return out;
}

async function hevySync(btn){
  const key=state.key.trim();
  if(!key){alert("Add your Hevy API key in Setup first (hevy.com → Settings → API).");return;}
  if(btn){btn.disabled=true;btn.textContent="Syncing…";}
  try{
    const byDate={...state.hevy.byDate};
    let page=1,pages=1,fetched=0;
    const cutoff=new Date(startDate());cutoff.setDate(cutoff.getDate()-7);
    while(page<=pages&&page<=15){
      const r=await fetch("https://api.hevyapp.com/v1/workouts?page="+page+"&pageSize=10",{headers:{"api-key":key}});
      if(r.status===401)throw new Error("Invalid API key (401).");
      if(!r.ok)throw new Error("Hevy error "+r.status);
      const j=await r.json();
      pages=j.page_count||1;
      let older=false;
      for(const w of (j.workouts||[])){
        const st=new Date(w.start_time);
        if(st<cutoff){older=true;continue;}
        const en=w.end_time?new Date(w.end_time):null;
        let vol=0,sets=0;
        const exd=[];
        (w.exercises||[]).forEach(e=>{
          let best=null;
          (e.sets||[]).forEach(s=>{sets++;vol+=(s.weight_kg||0)*(s.reps||0);
            if(s.weight_kg&&s.reps){const e1=s.weight_kg*(1+s.reps/30);if(!best||e1>best.e1)best={wkg:s.weight_kg,reps:s.reps,e1};}});
          exd.push({t:e.title,wkg:best?best.wkg:null,reps:best?best.reps:null});
        });
        const rec={id:w.id,title:w.title||"Workout",start:w.start_time,mins:en?Math.round((en-st)/60000):null,vol:Math.round(vol*2.20462),sets,ex:(w.exercises||[]).length,exd};
        const k=iso(st);
        byDate[k]=byDate[k]||[];
        const idx=byDate[k].findIndex(x=>x.id===rec.id);
        if(idx>=0)byDate[k][idx]=rec;else byDate[k].push(rec);
        fetched++;
      }
      if(older)break;
      page++;
    }
    state.hevy={byDate,last:new Date().toISOString()};
    applyAutoComplete();
    save();render();
    alert("Synced "+fetched+" workouts from Hevy.");
  }catch(e){
    alert("Sync failed: "+e.message);
  }
  if(btn){btn.disabled=false;btn.textContent="Sync Hevy";}
}

/* ================= COMPLIANCE + NUMBERS ENGINE ================= */
function mapLift(title){
  const t=(title||"").toLowerCase();
  if(t.includes("power clean"))return "pc";
  if(t.includes("push press"))return "pp";
  if(t.includes("rack pull"))return "rack";
  if(t.includes("overhead press")||t.includes("shoulder press")||t.includes("military press"))return "ohp";
  if(t.includes("bench press"))return "bench";
  if(t.includes("deadlift")&&!t.includes("romanian")&&!t.includes("stiff")&&!t.includes("single"))return "dead";
  if(t.includes("squat")&&!/goblet|jump|split|bulgarian|pistol|front|hack|sissy/.test(t))return "squat";
  if(t.includes("row")&&/barbell|pendlay|bent over/.test(t))return "row";
  return null;
}
function actualFor(w,d,liftKey){
  for(const wo of hevyFor(w,d))for(const e of (wo.exd||[])){
    if(mapLift(e.t)===liftKey&&e.wkg)return {lb:Math.round(e.wkg*2.20462),reps:e.reps};
  }
  return null;
}
function hevySuggestions(){
  const best={};
  for(const arr of Object.values(state.hevy.byDate))for(const wo of arr)for(const e of (wo.exd||[])){
    const lk=mapLift(e.t);if(!lk||!e.wkg||!e.reps)continue;
    const e1=Math.round(e.wkg*2.20462*(1+Math.min(e.reps,12)/30)/2.5)*2.5;
    if(!best[lk]||e1>best[lk])best[lk]=e1;
  }
  return best;
}

  if(wk.phase==="Base"&&wk.phaseWeek<=4)return [95,125,155,180][wk.phaseWeek-1];
  if(wk.phase==="Armor")return 120;
  if(wk.phase==="Operator"){
    const bw=wk.phaseWeek;
    if(bw===13)return null;
    if(bw===6||bw===12)return 90;
    if(bw>6)return 150;
    return (bw%2===1)?120:150;
  }
  return null;
}

function applyAutoComplete(){

    const j=JSON.parse(txt);
    const arr=Array.isArray(j)?j:(j.workouts||j.data||[]);
    for(const o of arr)recs.push({title:o.type||o.workoutActivityType||o.title||"Workout",start:o.start||o.startDate||o.date,mins:hnum(o.mins||o.duration),km:hnum(o.km||o.distance),kcal:hnum(o.kcal||o.energy||o.activeEnergy),hr:hnum(o.hr||o.avgHR||o.heartRate)});
  }else{
    for(const line of txt.split(/\n+/)){
      const p=line.split("|").map(s=>s.trim());
      if(p.length<2)continue;
      recs.push({title:p[0]||"Workout",start:p[1],mins:hnum(p[2]),km:hnum(p[3]),kcal:hnum(p[4]),hr:hnum(p[5])});
    }
  }
  const byDate={...state.health.byDate};
  let n=0;
  for(const r of recs){
    const dt=new Date(r.start);
    if(isNaN(dt))continue;
    if(r.mins&&r.mins>300)r.mins=Math.round(r.mins/60); // seconds -> minutes
    const k=iso(dt);
    byDate[k]=byDate[k]||[];
    if(!byDate[k].some(x=>x.start===r.start&&x.title===r.title)){byDate[k].push(r);n++;}
  }
  if(!n&&!recs.length)throw new Error("no workouts recognized");
  state.health={byDate,last:new Date().toISOString()};
  applyAutoComplete();
  save();render();
  return n;
}

  const comp=s.lines.filter(l=>l.pct).map(l=>{

    return '<div class="line"><span class="nm">'+esc(l.nm.split(" @")[0])+'</span><span class="sc">did '+a.lb+" lb × "+a.reps+'</span><span class="wt" style="color:'+(ok?"var(--done)":"var(--hic)")+'">'+(presc?(ok?"✓ vs "+presc:presc-a.lb+" lb short"):"")+"</span></div>";
  }).filter(Boolean).join("");
  if(comp)html+='<h2 style="font-size:.8rem;text-transform:uppercase;color:var(--dim);margin-top:14px">Prescribed vs actual (Hevy)</h2>'+comp;
  const hl=healthFor(w,d);
  if(hl.length){
    html+='<h2 style="font-size:.8rem;text-transform:uppercase;color:var(--dim);margin-top:14px">Apple Health — this day</h2>';
    html+=hl.map(x=>'<div class="hevy-item"><div>'+esc(x.title)+'</div><div style="text-align:right">'+(x.mins?Math.round(x.mins)+" min":"")+'<div class="t">'+[(x.km?x.km.toFixed(1)+" km":""),(x.hr?Math.round(x.hr)+" bpm":"")].filter(Boolean).join(" · ")+"</div></div></div>").join("");
  }
  if(s.tag!=="rest"){
    html+='<div class="btnrow">'+
      '<button class="b-pri" onclick="setStatus('+w+","+d+",'done');closeModal()\">"+(st==="done"?"✓ Done":"Mark Done")+"</button>"+
      '<button class="b-sec" onclick="setStatus('+w+","+d+",'skip');closeModal()\">"+(st==="skip"?"Skipped ✓":"Skip")+"</button>"+
      (st?'<button class="b-ghost" onclick="setStatus('+w+","+d+",null);closeModal()\">Clear</button>":"")+
      "</div>";
  }
  // reschedule controls
  const curSlot=slotOf(w,d);
  const ord=orderOf(w);
  let opts='<option value="">— pick a day —</option>';
  for(let slot=1;slot<=7;slot++){
    if(slot===curSlot)continue;
    const other=wk.days[ord[slot-1]-1];
    opts+='<option value="'+slot+'">Day '+slot+" · "+fmtD(dateOfSlot(w,slot))+" — "+esc(dayShort(other))+"</option>";
  }
  html+='<label style="margin-top:16px">Move this session (swaps with target day)</label><select onchange="moveSession('+w+","+d+',this.value)">'+opts+"</select>";
  const abs=absOf(w,curSlot);
  html+='<label>Push whole schedule back, starting from this day</label><div class="btnrow" style="margin-top:0">'+
    '<button class="b-sec" style="flex:1" onclick="pushSchedule('+abs+',1)">+1 day</button>'+
    '<button class="b-sec" style="flex:1" onclick="pushSchedule('+abs+',2)">+2 days</button>'+
    '<button class="b-sec" style="flex:1" onclick="pushSchedule('+abs+',7)">+1 week</button></div>';
  html+='<div class="btnrow"><button class="b-ghost" style="flex:1" onclick="toggleDeload('+w+');closeModal()">'+(state.deloads.includes(w)?"Remove deload after Week "+w:"Insert deload week after Week "+w)+"</button></div>";
  document.getElementById("sheet").innerHTML=html;
  document.getElementById("modal").classList.add("open");
}
function closeModal(){document.getElementById("modal").classList.remove("open");}
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal();});
document.getElementById("modal").addEventListener("touchend",e=>{if(e.target.id==="modal"){e.preventDefault();closeModal();}});
/* ================= ACTIONS ================= */
function setStatus(w,d,v){
  const k=w+"."+d;
  if(v===null)delete state.status[k];
  else if(state.status[k]===v)delete state.status[k];
  else state.status[k]=v;
  save();render();
}
function setMax(k,v){
  const n=parseFloat(v);
  if(n>0)state.maxes[k]=n;else delete state.maxes[k];
  save();
}
function moveSession(w,origD,slotStr){
  const ts=parseInt(slotStr);
  if(!ts)return;
  const ord=orderOf(w).slice();
  const cs=ord.indexOf(origD);
  const tmp=ord[ts-1];ord[ts-1]=origD;ord[cs]=tmp;
  state.order[w]=ord;
  save();closeModal();render();
}
function pushSchedule(abs,days){
  state.shifts.push({fromAbs:abs,days});
  save();closeModal();render();
}
function removeShift(i){state.shifts.splice(i,1);save();render();}
function toggleDeload(w){
  const i=state.deloads.indexOf(w);
  if(i>=0)state.deloads.splice(i,1);else{state.deloads.push(w);state.deloads.sort((a,b)=>a-b);}
  save();render();
}
function exportJson(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="tb-activation-backup-"+iso(new Date())+".json";
  a.click();
}
function importJson(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{state=Object.assign(defaultState(),JSON.parse(r.result));save();render();alert("Imported.");}catch(e){alert("Invalid file.");}};
  r.readAsText(f);
}
/* ================= NAV ================= */
function render(){
  document.querySelectorAll("#tabbar button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  if(tab==="today")renderToday();
  else if(tab==="plan")renderPlan();
  else if(tab==="stats")renderStats();
  else renderSettings();
  window.scrollTo(0,0);
}
document.querySelectorAll("#tabbar button").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
load();render();
</script>
</body>
</html>
